name: Add to Project
on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v2.0.0
        with:
          project-url: https://github.com/orgs/filbeam/projects/4
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
